name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cv:latest .

      - name: Stop and remove old container
        run: docker rm -f cv || true

      - name: Run new container
        run: |
          docker run -d \
            --name cv \
            --restart unless-stopped \
            -p 127.0.0.1:3010:80 \
            cv:latest

      - name: Health check
        run: sleep 3 && curl -sf http://127.0.0.1:3010 > /dev/null
